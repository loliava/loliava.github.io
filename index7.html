<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>研发技能竞赛 · 抢答系统 (语音播报版)</title>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <style>
        :root {
            --bg-dark: #0a0f1c;
            --glass-bg: rgba(18, 25, 40, 0.7);
            --gold: #ffd700;
            --gold-light: #ffeb99;
            --red-accent: #e63946;
            --green-accent: #2ecc71;
            --card-radius: 28px;
            --btn-radius: 40px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "PingFang SC", "Microsoft YaHei", sans-serif;
        }

        body {
            background: radial-gradient(circle at 20% 30%, #1e2a3a, #0b1018);
            min-height: 100vh;
            color: white;
            -webkit-font-smoothing: antialiased;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .pc-container {
            width: 1440px;
            max-width: 100%;
            padding: 24px 30px 30px;
            background: var(--glass-bg);
            backdrop-filter: blur(30px) saturate(200%);
            -webkit-backdrop-filter: blur(30px) saturate(200%);
            border: 1px solid rgba(255, 215, 0, 0.2);
            border-radius: 48px;
            box-shadow: 0 30px 50px rgba(0,0,0,0.6), 0 0 0 2px rgba(255,215,0,0.1) inset;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            padding-bottom: 16px;
            border-bottom: 2px solid rgba(255, 215, 0, 0.4);
        }
        .title-section h1 {
            font-size: 42px;
            font-weight: 700;
            background: linear-gradient(135deg, #ffffff, #ffd966);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 4px 20px rgba(255,215,0,0.3);
            letter-spacing: 2px;
        }
        .title-section p {
            font-size: 16px;
            color: #ffd966;
            margin-top: 6px;
            font-weight: 500;
        }
        .header-actions {
            display: flex;
            gap: 15px;
        }
        .room-badge {
            background: rgba(0,0,0,0.4);
            padding: 12px 24px;
            border-radius: 60px;
            border: 1px solid var(--gold);
            font-size: 18px;
            font-weight: 600;
        }
        .room-badge strong {
            color: var(--gold);
            font-size: 22px;
            margin-left: 10px;
        }

        .icon-btn {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,215,0,0.3);
            color: var(--gold);
            font-size: 24px;
            width: 56px;
            height: 56px;
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            backdrop-filter: blur(10px);
            transition: all 0.2s;
        }
        .icon-btn:hover { background: rgba(255,215,0,0.15); transform: scale(0.96); }

        .question-card {
            background: rgba(10, 18, 30, 0.6);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,215,0,0.3);
            border-radius: 36px;
            padding: 40px 50px;
            margin: 20px 0 30px;
            box-shadow: 0 20px 30px rgba(0,0,0,0.5), 0 0 30px rgba(255,215,0,0.1) inset;
            text-align: center;
        }
        .q-meta {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 25px;
        }
        .q-type {
            background: var(--green-accent);
            color: #000;
            font-weight: 700;
            padding: 8px 24px;
            border-radius: 50px;
            font-size: 18px;
            letter-spacing: 1px;
        }
        .q-text {
            font-size: 52px;
            font-weight: 700;
            line-height: 1.4;
            margin-bottom: 30px;
            color: #fff;
            text-shadow: 0 4px 15px rgba(0,0,0,0.5);
            word-break: break-word;
        }
        .options-grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px 40px;
            margin: 20px 0 10px;
        }
        .option-item {
            font-size: 32px;
            background: rgba(255,255,255,0.03);
            padding: 16px 32px;
            border-radius: 60px;
            border: 1px solid rgba(255,215,0,0.2);
            backdrop-filter: blur(8px);
        }
        .option-item strong {
            color: var(--gold);
            margin-right: 18px;
            font-size: 36px;
        }
        .answer-area {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 2px dashed rgba(255,215,0,0.4);
            font-size: 40px;
            font-weight: 600;
            color: var(--gold-light);
        }

        .action-bar {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 18px;
            margin: 25px 0 20px;
        }
        .primary-btn {
            background: linear-gradient(145deg, #f1c40f, #f39c12);
            border: none;
            color: #1e1e1e;
            font-weight: 800;
            font-size: 24px;
            padding: 18px 40px;
            border-radius: 60px;
            box-shadow: 0 10px 0 #b86d0e, 0 5px 20px rgba(241,196,15,0.4);
            cursor: pointer;
            transition: all 0.1s;
            border: 1px solid #ffe28c;
            letter-spacing: 2px;
        }
        .primary-btn:active {
            transform: translateY(5px);
            box-shadow: 0 5px 0 #b86d0e, 0 8px 15px rgba(241,196,15,0.4);
        }
        .secondary-btn {
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,215,0,0.4);
            color: var(--gold);
            font-weight: 700;
            font-size: 22px;
            padding: 14px 32px;
            border-radius: 50px;
            cursor: pointer;
            transition: 0.1s;
            box-shadow: 0 4px 0 rgba(0,0,0,0.3);
        }
        .secondary-btn:active { transform: translateY(3px); box-shadow: 0 1px 0 rgba(0,0,0,0.3); }

        .buzz-banner {
            text-align: center;
            font-size: 48px;
            font-weight: 800;
            color: var(--gold);
            text-shadow: 0 0 30px #ffb347;
            margin: 20px 0 15px;
            min-height: 80px;
        }

        .teams-container {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            margin: 15px 0 20px;
        }
        .team-tile {
            flex: 1;
            background: rgba(0,0,0,0.35);
            backdrop-filter: blur(15px);
            border-radius: 30px;
            padding: 18px 5px 14px;
            border: 1px solid rgba(255,215,0,0.2);
            text-align: center;
            transition: all 0.2s;
            box-shadow: 0 10px 15px rgba(0,0,0,0.3);
        }
        .team-tile.active-tile {
            border: 3px solid var(--gold);
            box-shadow: 0 0 40px #ffd700, 0 10px 20px black;
            animation: pulse-gold 1.8s infinite;
        }
        @keyframes pulse-gold {
            0%,100% { box-shadow: 0 0 20px #ffd700, 0 10px 20px black; }
            50% { box-shadow: 0 0 50px #ffb347, 0 10px 25px black; }
        }
        .team-score {
            font-size: 44px;
            font-weight: 900;
            color: var(--gold);
            line-height: 1.2;
        }
        .team-name {
            font-size: 26px;
            font-weight: 600;
            margin: 8px 0 5px;
        }
        .score-ops {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 10px;
        }
        .score-btn-small {
            background: rgba(255,255,255,0.1);
            border: 1px solid var(--gold);
            color: var(--gold);
            font-weight: bold;
            font-size: 22px;
            width: 48px;
            height: 48px;
            border-radius: 30px;
            cursor: pointer;
            backdrop-filter: blur(5px);
            transition: 0.1s;
        }
        .score-btn-small:active { transform: scale(0.9); }

        .phone-container { display: none; }
        @media (max-width: 768px) {
            body { padding: 0; }
            .pc-container { display: none !important; }
            .phone-container {
                display: block;
                width: 100vw;
                min-height: 100vh;
                padding: 20px 16px;
                background: radial-gradient(circle at 30% 20%, #1e2a3a, #0b1018);
            }
            .phone-title { font-size: 48px; }
            .input-field { height: 70px; font-size: 22px; }
            .action-btn { height: 70px; font-size: 28px; }
            .team-info { font-size: 56px; }
            .answer-btn { height: 220px; font-size: 60px; border-radius: 50px; }
            .status-tip { font-size: 26px; }
        }
    </style>
</head>
<body>

<div class="pc-container">
    <div class="header">
        <div class="title-section">
            <h1>⚡ 匠心铸技 · 智创未来 ⚡</h1>
            <p>商用电器事业部 · 研发中心首届技能挑战赛</p>
        </div>
        <div class="header-actions">
            <div class="room-badge">
                🏠 房间号 <strong id="roomIdDisplay">----</strong>
            </div>
            <div class="icon-btn" onclick="toggleFullscreen()" title="全屏模式">⛶</div>
        </div>
    </div>

    <div class="question-card">
        <div class="q-meta">
            <span class="q-type" id="questionType">加载题库中</span>
        </div>
        <div class="q-text" id="question">点击「加载题库」开始</div>
        <div class="options-grid" id="optionsArea"></div>
        <div class="answer-area" id="answerText">参考答案：********</div>
    </div>

    <div class="action-bar">
        <button class="primary-btn" onclick="nextQuestion()">🎲 随机出题</button>
        <button class="secondary-btn" onclick="toggleAnswer()">🔎 显示答案</button>
        <button class="secondary-btn" onclick="clearAnswer()">🔄 清空抢答</button>
        <button class="secondary-btn" id="enableSpeechBtn" onclick="enableSpeech()">🔊 启用语音</button>
    </div>

    <div class="buzz-banner" id="showTeam">✨ 等待抢答 ✨</div>

    <div class="teams-container" id="teamGrid"></div>

    <div style="display: flex; justify-content: center; gap: 25px; margin-top: 20px;">
        <button class="secondary-btn" onclick="addScore(2)">➕ 加 2 分</button>
        <button class="secondary-btn" onclick="addScore(-2)">➖ 扣 2 分</button>
        <button class="secondary-btn" onclick="resetAllScores()">🔄 重置比分</button>
    </div>
    <div style="text-align: right; margin-top: 12px; opacity: 0.6; font-size: 14px;">手机端输入房间号加入抢答</div>
</div>

<div class="phone-container">
    <div class="phone-title">团队抢答器</div>
    <div class="join-section" id="joinSection">
        <input type="text" class="input-field" id="roomIdInput" placeholder="输入主持人房间号" inputmode="text">
        <input type="password" class="input-field" id="teamPassword" placeholder="输入本队密码" inputmode="text">
        <button class="action-btn" onclick="joinRoom()">加入房间</button>
        <div class="error-tip" id="errorTip">房间号或密码错误</div>
    </div>
    <div class="answer-section" id="answerSection">
        <div class="team-info" id="teamInfo">研发一队</div>
        <button class="answer-btn" id="answerBtn" disabled onclick="sendAnswer()">我要抢答</button>
        <div class="status-tip" id="statusTip">等待主持人出题</div>
    </div>
</div>

<script>
    (function(){
        const teamConfig = [
            {id:1,name:"研发一队",password:"dev001",score:10},
            {id:2,name:"研发二队",password:"dev002",score:10},
            {id:3,name:"研发三队",password:"dev003",score:10},
            {id:4,name:"研发四队",password:"dev004",score:10},
            {id:5,name:"研发五队",password:"dev005",score:10},
            {id:6,name:"研发六队",password:"dev006",score:10}
        ];
        let allQuestions = [], currentTeam = null;
        let isHost = window.innerWidth > 768;
        let canAnswer = false, answerLocked = false;
        let peer = null, connections = [], hostPeerId = null;
        let currentAnswer = '', showAnswerFlag = false;
        let currentWinnerId = null;

        // 语音相关
        let speechEnabled = false;
        let speechQueue = [];
        let isSpeaking = false;

        // 激活语音权限
        window.enableSpeech = function() {
            if (speechEnabled) {
                speak('语音已启用');
                return;
            }
            const utterance = new SpeechSynthesisUtterance('');
            utterance.volume = 0;
            utterance.onstart = () => {
                speechEnabled = true;
                const btn = document.getElementById('enableSpeechBtn');
                if (btn) btn.innerText = '🔊 语音已启用';
                setTimeout(() => speak('语音系统已激活'), 100);
            };
            utterance.onerror = () => {
                alert('语音功能不可用，请检查浏览器设置或使用 Chrome/Edge。');
            };
            window.speechSynthesis.speak(utterance);
        };

        function speak(text) {
            if (!isHost || !speechEnabled) return;
            speechQueue.push(text);
            if (!isSpeaking) processSpeechQueue();
        }

        function processSpeechQueue() {
            if (speechQueue.length === 0) {
                isSpeaking = false;
                return;
            }
            isSpeaking = true;
            const utterance = new SpeechSynthesisUtterance(speechQueue.shift());
            utterance.lang = 'zh-CN';
            utterance.rate = 0.9;
            utterance.pitch = 1.1;
            utterance.onend = () => processSpeechQueue();
            utterance.onerror = () => processSpeechQueue();
            window.speechSynthesis.speak(utterance);
        }

        function initPeer() {
            peer = new Peer(undefined, { host: '0.peerjs.com', port: 443, secure: true, debug: 0 });
            peer.on('open', id => { if(isHost){ hostPeerId = id; document.getElementById('roomIdDisplay').innerText = id; } });
            peer.on('connection', conn => {
                connections.push(conn);
                conn.on('data', data => handleIncomingMessage(data, conn));
                conn.on('close', () => connections = connections.filter(c => c.peer !== conn.peer));
            });
            peer.on('error', err => { if(isHost) alert('通信出错，请刷新'); });
        }

        function handleIncomingMessage(data, conn) {
            if(isHost) {
                if(data.type === 'buzz' && canAnswer && !answerLocked) {
                    const team = teamConfig.find(t=>t.id===data.teamId); if(!team) return;
                    answerLocked = true; canAnswer = false; currentWinnerId = team.id;
                    document.getElementById('showTeam').innerHTML = `🏆 ${team.name} 抢答成功！`;
                    highlightTeam(team.id);
                    speak(`${team.name}，抢答成功`);
                    connections.forEach(c=>c.send({type:'buzzResult', success:true, teamName:team.name}));
                    broadcastState();
                }
            } else {
                if(data.type === 'state') { canAnswer = data.canAnswer; answerLocked = data.answerLocked; updatePhoneUI(); }
                else if(data.type === 'buzzResult' && data.success) {
                    document.getElementById('statusTip').innerText = `【${data.teamName}】抢答成功！`;
                    document.getElementById('answerBtn').disabled = true;
                }
            }
        }

        function broadcastState() { if(isHost) connections.forEach(c=>c.send({type:'state', canAnswer, answerLocked})); }
        function updatePhoneUI() {
            if(isHost) return;
            const btn = document.getElementById('answerBtn'), tip = document.getElementById('statusTip');
            if(canAnswer && !answerLocked) { btn.disabled = false; tip.innerText = '可抢答！'; }
            else if(answerLocked) { btn.disabled = true; tip.innerText = '抢答已结束'; }
            else { btn.disabled = true; tip.innerText = '等待出题'; }
        }

        function renderTeams() {
            const grid = document.getElementById('teamGrid'); grid.innerHTML = '';
            teamConfig.forEach(t => {
                const tile = document.createElement('div'); tile.className = 'team-tile'; tile.id = `tile-${t.id}`;
                tile.innerHTML = `<div class="team-score" id="score-${t.id}">${t.score}</div>
                    <div class="team-name">${t.name}</div>
                    <div class="score-ops">
                        <button class="score-btn-small" onclick="adjustTeamScore(${t.id}, 1)">+</button>
                        <button class="score-btn-small" onclick="adjustTeamScore(${t.id}, -1)">-</button>
                    </div>`;
                grid.appendChild(tile);
            });
        }

        window.adjustTeamScore = function(teamId, delta) {
            if(!isHost) return;
            const team = teamConfig.find(t=>t.id===teamId); if(!team) return;
            team.score = Math.max(0, team.score + delta);
            document.getElementById(`score-${teamId}`).innerText = team.score;
            const actionText = delta > 0 ? `加${delta}分` : `减${-delta}分`;
            speak(`${team.name}，${actionText}`);
        };

        function updateScoreUI(teamId) { const el = document.getElementById(`score-${teamId}`); if(el) el.innerText = teamConfig.find(t=>t.id===teamId).score; }
        function highlightTeam(teamId) {
            document.querySelectorAll('.team-tile').forEach(t=>t.classList.remove('active-tile'));
            document.getElementById(`tile-${teamId}`)?.classList.add('active-tile');
        }

        window.addScore = function(delta) {
            if(!isHost) return;
            if(currentWinnerId===null) { alert('尚无抢答成功的队伍'); return; }
            const team = teamConfig.find(t=>t.id===currentWinnerId);
            team.score = Math.max(0, team.score + delta);
            updateScoreUI(currentWinnerId);
            const actionText = delta > 0 ? `加${delta}分` : `减${-delta}分`;
            speak(`${team.name}，${actionText}`);
        };
        window.resetAllScores = function() { if(!isHost) return; teamConfig.forEach(t=>{ t.score = 10; updateScoreUI(t.id); }); };

        window.toggleFullscreen = function() {
            if(!document.fullscreenElement) document.documentElement.requestFullscreen();
            else document.exitFullscreen();
        };

        async function loadQuestions() {
            try {
                const res = await fetch('./研发知识题库.xlsx'); if(!res.ok) throw new Error('文件不存在');
                const data = await res.arrayBuffer();
                const wb = XLSX.read(data, {type:'array'});
                const sheet = wb.Sheets[wb.SheetNames[0]];
                const rows = XLSX.utils.sheet_to_json(sheet, {header:1});
                allQuestions = [];
                for(let i=1; i<rows.length; i++) {
                    const r = rows[i]; if(!r||!r[0]) continue;
                    const q = r[0].toString().trim();
                    const ans = r[1]?.toString().trim().toUpperCase(); if(!q||!ans) continue;
                    const opts = [];
                    for(let j=2; j<=9; j++) if(r[j]?.toString().trim()) opts.push(r[j].toString().trim());
                    let type = '问答';
                    if(opts.length===2) type='判断';
                    else if(opts.length>=3) type = (ans.length===1 && /[A-Z]/.test(ans)) ? '单选' : '多选';
                    allQuestions.push({question:q, answer:ans, options:opts, type});
                }
                if(isHost) {
                    document.getElementById('questionType').innerText = `📚 题库 ${allQuestions.length} 题`;
                    document.getElementById('question').innerText = '题库就绪，点击「随机出题」';
                }
            } catch(e) { if(isHost) document.getElementById('question').innerText = '题库加载失败，请检查文件'; }
        }

        // 重写nextQuestion，首次自动激活语音
        const originalNext = function() {
            if(!isHost||!allQuestions.length) return;
            const q = allQuestions[Math.floor(Math.random()*allQuestions.length)];
            currentAnswer = q.answer;
            document.getElementById('questionType').innerText = `📌 ${q.type}题`;
            document.getElementById('question').innerText = q.question;
            const optDiv = document.getElementById('optionsArea');
            if(q.options.length) {
                const letters = ['A','B','C','D','E','F','G','H'];
                optDiv.innerHTML = q.options.map((o,i)=>`<div class="option-item"><strong>${letters[i]}</strong> ${o}</div>`).join('');
            } else optDiv.innerHTML = '<div class="option-item">(本题无选项，口头作答)</div>';
            showAnswerFlag = false;
            document.getElementById('answerText').innerText = '参考答案：********';
            canAnswer = true; answerLocked = false; currentWinnerId = null;
            document.getElementById('showTeam').innerHTML = '✨ 等待抢答 ✨';
            document.querySelectorAll('.team-tile').forEach(t=>t.classList.remove('active-tile'));
            broadcastState();
        };

        window.nextQuestion = function() {
            if (!speechEnabled) enableSpeech();   // 首次出题时激活语音
            originalNext();
        };

        window.toggleAnswer = function() {
            if(!isHost) return;
            showAnswerFlag = !showAnswerFlag;
            document.getElementById('answerText').innerText = showAnswerFlag ? `参考答案：${currentAnswer}` : '参考答案：********';
        };
        window.clearAnswer = function() {
            if(!isHost) return;
            canAnswer = false; answerLocked = false; currentWinnerId = null;
            document.getElementById('showTeam').innerHTML = '✨ 等待抢答 ✨';
            document.querySelectorAll('.team-tile').forEach(t=>t.classList.remove('active-tile'));
            broadcastState();
        };

        window.joinRoom = function() {
            const room = document.getElementById('roomIdInput').value.trim();
            const pwd = document.getElementById('teamPassword').value.trim();
            const team = teamConfig.find(t=>t.password===pwd);
            if(!room||!team) { document.getElementById('errorTip').style.display='block'; setTimeout(()=>document.getElementById('errorTip').style.display='none',2000); return; }
            currentTeam = team;
            const conn = peer.connect(room, {reliable:true});
            conn.on('open', ()=>{
                document.getElementById('joinSection').style.display='none';
                document.getElementById('answerSection').style.display='block';
                document.getElementById('teamInfo').innerText = team.name;
                conn.on('data', data=>handleIncomingMessage(data, conn));
            });
            conn.on('error', ()=>alert('连接失败，检查房间号'));
        };
        window.sendAnswer = function() {
            if(!currentTeam||!canAnswer||answerLocked) return;
            const conns = Object.values(peer.connections).flat();
            if(conns.length) {
                conns[0].send({type:'buzz', teamId:currentTeam.id});
                document.getElementById('answerBtn').disabled = true;
                document.getElementById('statusTip').innerText = '抢答已提交';
            }
        };

        window.onload = async function() {
            initPeer();
            await loadQuestions();
            if(isHost) { renderTeams(); setTimeout(()=>{ if(!hostPeerId) alert('正在连接...'); },2000); }
        };
    })();
</script>
</body>
</html>
