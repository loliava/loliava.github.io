<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>研发技能竞赛 - 团队抢答系统（升级版）</title>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", sans-serif;
        }

        body {
            background: #0f1941;
            color: #fff;
            overflow-x: hidden;
        }

        /* 电脑端样式 */
        .pc-container {
            display: block;
            width: 100vw;
            height: 100vh;
            padding: 20px;
        }

        .header {
            text-align: center;
            padding: 15px 0;
            border-bottom: 2px solid #42b983;
        }

        .header h1 {
            font-size: 32px;
            color: #42b983;
        }

        .question-area {
            margin: 30px auto;
            width: 90%;
            min-height: 250px;
            background: rgba(255,255,255,0.05);
            border-radius: 10px;
            padding: 30px;
            border: 1px solid #42b983;
            overflow-y: auto;
        }

        .question-title {
            font-size: 24px;
            margin-bottom: 20px;
            line-height: 1.6;
        }

        .question-type {
            display: inline-block;
            padding: 5px 12px;
            background: #42b983;
            color: #fff;
            border-radius: 4px;
            font-size: 14px;
            margin-right: 10px;
            margin-bottom: 15px;
        }

        .answer-block {
            font-size: 18px;
            color: #ccc;
            line-height: 1.8;
            margin-top: 20px;
        }

        .control-group {
            text-align: center;
            margin: 20px 0;
        }

        .control-btn {
            padding: 12px 30px;
            margin: 0 10px;
            font-size: 18px;
            background: #42b983;
            color: #fff;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: 0.3s;
        }

        .control-btn:hover {
            background: #359469;
        }

        .team-result {
            text-align: center;
            margin-top: 20px;
            font-size: 32px;
            color: #ffd700;
            font-weight: bold;
            min-height: 60px;
            padding: 10px 0;
        }

        .team-grid {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 30px;
            flex-wrap: wrap;
        }

        .team-item {
            width: 160px;
            height: 80px;
            background: rgba(255,255,255,0.1);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            border: 2px solid #fff;
            transition: 0.3s;
        }

        .team-item.active {
            background: #ffd700;
            color: #000;
            border-color: #ffd700;
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(255,215,0,0.5);
        }

        /* 手机端样式 */
        .phone-container {
            display: none;
            width: 100vw;
            height: 100vh;
            background: #0f1941;
            padding: 20px;
            position: relative;
        }

        .phone-title {
            text-align: center;
            font-size: 24px;
            color: #42b983;
            margin-bottom: 40px;
            padding-top: 30px;
        }

        /* 密码验证区域 */
        .password-section {
            margin: 50px auto 0;
            width: 90%;
        }

        .password-input {
            width: 100%;
            height: 50px;
            font-size: 18px;
            padding: 0 15px;
            border-radius: 8px;
            border: none;
            margin-bottom: 20px;
        }

        .login-btn {
            width: 100%;
            height: 50px;
            font-size: 20px;
            background: #42b983;
            color: #fff;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        .error-tip {
            text-align: center;
            color: #e63946;
            margin-top: 15px;
            font-size: 16px;
            display: none;
        }

        /* 抢答区域（默认隐藏） */
        .answer-section {
            display: none;
            margin-top: 40px;
        }

        .team-info {
            text-align: center;
            font-size: 28px;
            color: #ffd700;
            margin-bottom: 50px;
            font-weight: bold;
        }

        .answer-btn {
            width: 100%;
            height: 140px;
            font-size: 36px;
            background: #e63946;
            color: #fff;
            border: none;
            border-radius: 15px;
            font-weight: bold;
            transition: 0.3s;
        }

        .answer-btn:active {
            transform: scale(0.95);
            background: #c1121f;
        }

        .status-tip {
            text-align: center;
            margin-top: 30px;
            color: #ccc;
            font-size: 18px;
        }

        /* 响应式判断 */
        @media (max-width: 768px) {
            .pc-container { display: none !important; }
            .phone-container { display: block !important; }
        }
    </style>
</head>
<body>

<!-- 电脑端 - 主持人界面 -->
<div class="pc-container">
    <div class="header">
        <h1>商用电器事业部研发技能竞赛<br>团队知识抢答赛</h1>
    </div>

    <div class="question-area">
        <div id="questionType" class="question-type">题目类型：未加载</div>
        <div class="question-title" id="question">点击【加载题库】后开始出题</div>
        <div class="answer-block" id="answer">参考答案：待加载</div>
    </div>

    <div class="control-group">
        <button class="control-btn" onclick="loadExcelQuestions()">加载题库</button>
        <button class="control-btn" onclick="nextQuestion()">随机出题</button>
        <button class="control-btn" onclick="clearAnswer()">清空抢答</button>
    </div>

    <div class="team-result" id="showTeam">等待抢答...</div>

    <div class="team-grid">
        <div class="team-item" id="t1">研发一队</div>
        <div class="team-item" id="t2">研发二队</div>
        <div class="team-item" id="t3">研发三队</div>
        <div class="team-item" id="t4">研发四队</div>
        <div class="team-item" id="t5">研发五队</div>
        <div class="team-item" id="t6">研发六队</div>
    </div>
</div>

<!-- 手机端 - 抢答器（带密码验证） -->
<div class="phone-container">
    <div class="phone-title">团队抢答器</div>

    <!-- 密码验证区域 -->
    <div class="password-section" id="passwordSection">
        <input type="password" class="password-input" id="teamPassword" placeholder="请输入本队抢答密码">
        <button class="login-btn" onclick="verifyPassword()">验证并进入</button>
        <div class="error-tip" id="errorTip">密码错误，请重新输入</div>
    </div>

    <!-- 抢答操作区域 -->
    <div class="answer-section" id="answerSection">
        <div class="team-info" id="teamInfo">研发一队</div>
        <button class="answer-btn" id="answerBtn" disabled onclick="sendAnswer()">我要抢答</button>
        <div class="status-tip" id="statusTip">等待主持人出题...</div>
    </div>
</div>

<script>
    // 1. 基础配置
    // 团队密码配置（可根据实际情况修改）
    const teamConfig = [
        {id: 1, name: "研发一队", password: "dev001"},
        {id: 2, name: "研发二队", password: "dev002"},
        {id: 3, name: "研发三队", password: "dev003"},
        {id: 4, name: "研发四队", password: "dev004"},
        {id: 5, name: "研发五队", password: "dev005"},
        {id: 6, name: "研发六队", password: "dev006"}
    ];
    
    let allQuestions = []; // 存储Excel中的所有题目
    let currentTeam = null; // 当前登录的团队
    let canAnswer = false; // 是否允许抢答
    let answerLocked = false; // 抢答锁定（防止多队同时抢答）

    // 2. Excel题库加载功能
    function loadExcelQuestions() {
        // 创建隐藏的文件输入框用于选择Excel文件
        const fileInput = document.createElement('input');
        fileInput.type = 'file';
        fileInput.accept = '.xlsx, .xls';
        fileInput.style.display = 'none';
        
        // 选择文件后处理
        fileInput.onchange = function(e) {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    // 解析Excel文件
                    const data = new Uint8Array(e.target.result);
                    const workbook = XLSX.read(data, { type: 'array' });
                    
                    // 读取第一个工作表（可根据实际修改工作表名称）
                    const firstSheetName = workbook.SheetNames[0];
                    const worksheet = workbook.Sheets[firstSheetName];
                    
                    // 转换为JSON格式（假设第一行为表头：题目,类型,答案）
                    const jsonData = XLSX.utils.sheet_to_json(worksheet, { header: ['question', 'type', 'answer'] });
                    
                    // 移除表头行，保留有效题目
                    allQuestions = jsonData.slice(1).filter(item => 
                        item.question && item.answer // 过滤空题目
                    );

                    // 提示加载结果
                    if (allQuestions.length > 0) {
                        alert(`题库加载成功！共加载 ${allQuestions.length} 道题目`);
                        document.getElementById('questionType').innerText = `题目类型：未选择`;
                        document.getElementById('question').innerText = `点击【随机出题】开始比赛`;
                        document.getElementById('answer').innerText = `参考答案：待显示`;
                    } else {
                        alert(`未读取到有效题目，请检查Excel格式`);
                    }
                } catch (error) {
                    alert(`题库加载失败：${error.message}`);
                    console.error('Excel解析错误：', error);
                }
            };
            reader.readAsArrayBuffer(file);
        };

        // 触发文件选择
        document.body.appendChild(fileInput);
        fileInput.click();
        document.body.removeChild(fileInput);
    }

    // 3. 电脑端功能
    // 随机出题
    function nextQuestion() {
        if (allQuestions.length === 0) {
            alert('请先点击【加载题库】导入题目');
            return;
        }

        // 重置抢答状态
        clearAnswer();
        answerLocked = false;
        canAnswer = true;

        // 随机选择一道题
        const randomIndex = Math.floor(Math.random() * allQuestions.length);
        const selectedQ = allQuestions[randomIndex];

        // 更新界面显示
        document.getElementById('questionType').innerText = `题目类型：${selectedQ.type || '通用知识'}`;
        document.getElementById('question').innerText = selectedQ.question;
        document.getElementById('answer').innerText = `参考答案：${selectedQ.answer}`;

        // 通知所有手机端可以开始抢答
        broadcastToPhones({ type: 'readyToAnswer' });
    }

    // 清空抢答状态
    function clearAnswer() {
        document.getElementById('showTeam').innerText = '等待抢答...';
        document.querySelectorAll('.team-item').forEach(item => {
            item.classList.remove('active');
        });
        canAnswer = false;
        answerLocked = false;

        // 通知所有手机端重置状态
        broadcastToPhones({ type: 'reset' });
    }

    // 接收手机端抢答消息
    function handlePhoneAnswer(teamId) {
        if (answerLocked || !canAnswer) return;
        
        // 锁定抢答，防止多队同时抢中
        answerLocked = true;
        canAnswer = false;

        // 查找团队信息
        const team = teamConfig.find(t => t.id === teamId);
        if (!team) return;

        // 更新电脑端显示
        document.getElementById('showTeam').innerText = `【${team.name}】抢答成功！`;
        document.getElementById(`t${teamId}`).classList.add('active');

        // 通知所有手机端抢答结果
        broadcastToPhones({ 
            type: 'answerResult', 
            success: true, 
            teamName: team.name 
        });
    }

    // 4. 手机端功能
    // 密码验证
    function verifyPassword() {
        const inputPwd = document.getElementById('teamPassword').value.trim();
        const team = teamConfig.find(t => t.password === inputPwd);

        if (team) {
            // 验证成功，显示抢答区域
            currentTeam = team;
            document.getElementById('passwordSection').style.display = 'none';
            document.getElementById('answerSection').style.display = 'block';
            document.getElementById('teamInfo').innerText = team.name;
        } else {
            // 验证失败，显示错误提示
            const errorTip = document.getElementById('errorTip');
            errorTip.style.display = 'block';
            setTimeout(() => {
                errorTip.style.display = 'none';
            }, 2000);
        }
    }

    // 发送抢答请求
    function sendAnswer() {
        if (!currentTeam || !canAnswer || answerLocked) return;

        // 向电脑端发送抢答消息
        if (window.opener) {
            window.opener.postMessage({
                type: 'phoneAnswer',
                teamId: currentTeam.id
            }, '*');
        } else {
            // 本地测试用（实际使用时需通过局域网）
            handlePhoneAnswer(currentTeam.id);
        }

        // 更新手机端状态
        document.getElementById('answerBtn').disabled = true;
        document.getElementById('statusTip').innerText = `抢答已提交，等待结果...`;
    }

    // 5. 跨设备通信功能
    // 广播消息到所有手机端
    function broadcastToPhones(message) {
        // 实际使用时需通过WebSocket或本地存储实现多设备通信
        // 此处为简化版，通过postMessage模拟
        if (window.frames.length > 0) {
            for (let i = 0; i < window.frames.length; i++) {
                window.frames[i].postMessage(message, '*');
            }
        }
    }

    // 监听跨设备消息
    window.addEventListener('message', function(e) {
        const message = e.data;
        switch (message.type) {
            // 接收电脑端的"准备抢答"指令
            case 'readyToAnswer':
                canAnswer = true;
                document.getElementById('answerBtn').disabled = false;
                document.getElementById('statusTip').innerText = '主持人已出题，可抢答！';
                break;
            
            // 接收电脑端的"重置"指令
            case 'reset':
                canAnswer = false;
                document.getElementById('answerBtn').disabled = true;
                document.getElementById('statusTip').innerText = '等待主持人出题...';
                break;
            
            // 接收电脑端的抢答结果
            case 'answerResult':
                if (message.success) {
                    document.getElementById('statusTip').innerText = `【${message.teamName}】抢答成功！`;
                } else {
                    document.getElementById('statusTip').innerText = '抢答失败，已被其他队伍抢中';
                }
                break;
            
            // 接收手机端的抢答请求（电脑端监听）
            case 'phoneAnswer':
                handlePhoneAnswer(message.teamId);
                break;
        }
    });

    // 6. 初始化操作
    window.onload = function() {
        // 提示电脑端加载题库
        if (window.innerWidth > 768) {
            setTimeout(() => {
                alert('欢迎使用研发技能竞赛抢答系统，请先点击【加载题库】导入Excel题目文件');
            }, 1000);
        }
    };
</script>
</body>
</html>
