<!DOCTYPE html>
<html lang="zh">
<head>

    <title>研发知识竞赛 · 团队抢答</title>

        * {

        }
        body {
            min-height: 100vh;
            background: #9e1e1e;  /* 沉稳暗红 */
            background: linear-gradient(145deg, #b42424 0%, #8b1a1a 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }
        .container {
            width: 1400px;
            max-width: 100%;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(4px);
            border-radius: 32px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            padding: 28px 32px 32px;
            border: 1px solid rgba(255, 215, 0, 0.3);
        }
        /* 头部 */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            padding-bottom: 16px;
            border-bottom: 2px solid #e0c080;
        }
        .title h1 {
            font-size: 2.5rem;
            font-weight: 700;
            color: #a02020;
            letter-spacing: 3px;
        }
        .title h1 small {
            font-size: 1.1rem;
            font-weight: 400;
            color: #5a3a3a;
            margin-left: 18px;
        }
        .actions {
            display: flex;
            gap: 12px;
        }
        .btn {
            background: #f5f0e8;
            border: 1px solid #b38867;
            color: #5e2e2e;
            padding: 10px 20px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            box-shadow: 0 3px 0 #9e6a5e;
            transition: all 0.1s;
            border-bottom: 3px solid #b38867;
        }
        .btn-primary {
            background: #c0392b;
            border-color: #922b21;
            color: white;
            box-shadow: 0 3px 0 #7b241c;
        }
        .btn:active { transform: translateY(3px); box-shadow: none; }
        /* 题目卡 */
        .question-card {
            background: #fefaf5;
            border-radius: 28px;
            padding: 28px 32px;
            margin-bottom: 28px;
            border: 1px solid #dac09a;
            box-shadow: inset 0 1px 4px rgba(0,0,0,0.02), 0 8px 12px rgba(160, 30, 30, 0.1);
        }
        .q-header {
            display: flex;
            justify-content: space-between;
            color: #8b3a3a;
            font-weight: 600;
            margin-bottom: 18px;
            font-size: 1.2rem;
        }
        .q-text {
            font-size: 2.2rem;
            font-weight: 700;
            color: #2c1e1e;
            line-height: 1.4;
            margin-bottom: 28px;
        }
        .options {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px 24px;
        }
        .option {
            background: white;
            border: 2px solid #e1c7b2;
            border-radius: 60px;
            padding: 16px 24px;
            font-size: 1.4rem;
            font-weight: 500;
            color: #2c1a1a;
            display: flex;
            align-items: center;
            gap: 18px;
            box-shadow: 0 4px 0 #b29782;
            transition: 0.1s;
        }
        .option-letter {
            background: #b43b3b;
            color: white;
            font-weight: 800;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.7rem;
            box-shadow: 0 3px 0 #712222;
        }
        .correct-highlight {
            border: 4px solid #2e7d32 !important;
            background: #e8f5e9 !important;
            box-shadow: 0 0 0 4px rgba(46,125,50,0.2);
        }
        /* 控制栏 */
        .buzz-controls {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin: 20px 0 30px;
        }
        .big-btn {
            background: #b43b3b;
            border: none;
            color: white;
            font-weight: 800;
            font-size: 1.9rem;
            padding: 18px 45px;
            border-radius: 70px;
            box-shadow: 0 8px 0 #712222;
            cursor: pointer;
            border: 1px solid #e6b873;
            letter-spacing: 6px;
            transition: 0.08s;
        }
        .big-btn:active { transform: translateY(6px); box-shadow: 0 2px 0 #712222; }
        .big-btn:disabled { opacity: 0.5; pointer-events: none; }
        .status-bar {
            text-align: center;
            font-size: 1.8rem;
            font-weight: 600;
            color: #5e2e2e;
            margin: 10px 0 15px;
            min-height: 60px;
        }

            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 15px;
            margin-top: 15px;
        }
        .team-card {
            background: #f7ede4;
            border-radius: 24px;
            padding: 18px 6px 14px;
            border: 2px solid #c9ab8f;
            box-shadow: 0 6px 0 #9f7e68;
            text-align: center;
            transition: 0.1s;
        }

            font-size: 1.5rem;
            font-weight: 800;
            color: #732c2c;
            margin-bottom: 8px;
        }
        .team-score {
            font-size: 3rem;
            font-weight: 900;
            color: #a52a2a;
            background: #f3e9de;
            display: inline-block;
            padding: 4px 20px;
            border-radius: 40px;
            border: 2px solid #c29a7a;
            margin-bottom: 12px;
        }

            background: #c0392b;
            border: none;
            color: white;
            font-weight: 800;
            font-size: 1.5rem;
            padding: 14px 5px;
            width: 90%;
            border-radius: 60px;
            box-shadow: 0 5px 0 #7b241c;
            cursor: pointer;
            margin-bottom: 12px;
            border: 1px solid #eeba6d;
            transition: 0.08s;

        .buzz-btn:disabled { opacity: 0.4; pointer-events: none; }

            background: #ece1d5;
            border: 2px solid #b58563;
            color: #5e2e2e;
            font-weight: bold;
            font-size: 1.4rem;
            width: 52px;
            height: 52px;
            border-radius: 30px;
            box-shadow: 0 4px 0 #9b755b;
            cursor: pointer;
        }
        .buzzed-highlight {
            box-shadow: 0 0 0 5px #e6b422, 0 6px 0 #9f7e68;
            border-color: #ffd966;
        }
        .footer {
            margin-top: 20px;
            text-align: right;
            color: #8b5a5a;
            font-weight: 500;
        }
    </style>
</head>

        judgeData.forEach(([q, ans]) => {
            FULL_BANK.push({ type: '判断', question: q, options: ['正确', '错误'], answer: ans });
        });

        // 随机抽取30题 (不重复)
        function selectRandomQuestions(count) {
            const shuffled = [...FULL_BANK];
            for (let i = shuffled.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
            }
            return shuffled.slice(0, count);
        }

        let selectedQuestions = selectRandomQuestions(30);
        let currentIndex = 0;
        let currentQuestion = selectedQuestions[0];

        // 队伍数据
        let teams = [
            { name: '🔥 超越队', score: 0 }, { name: '⚙️ 智造队', score: 0 },
            { name: '❄️ 冷锋队', score: 0 }, { name: '💡 创新队', score: 0 },
            { name: '🏆 先锋队', score: 0 }, { name: '🚀 卓越队', score: 0 }
        ];
        let buzzActive = false, buzzedTeam = null, lockBuzz = false;
        const BASE_SCORE = 10;

        // 音效
        function playSound(type) {
            try {
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const oscillator = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();
                oscillator.connect(gainNode);
                gainNode.connect(audioCtx.destination);
                const now = audioCtx.currentTime;
                if (type === 'correct') {
                    oscillator.frequency.value = 880;
                    gainNode.gain.setValueAtTime(0.3, now);
                    gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.2);
                    oscillator.start();
                    oscillator.stop(now + 0.2);
                } else {
                    oscillator.frequency.value = 440;
                    gainNode.gain.setValueAtTime(0.3, now);
                    gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.25);
                    oscillator.start();
                    oscillator.stop(now + 0.25);
                }
                audioCtx.onstatechange = null;
            } catch(e) { console.warn('音效播放失败'); }
        }

        // DOM
        const qIndexSpan = document.getElementById('qIndex'), qTypeSpan = document.getElementById('qType'), qText = document.getElementById('qText');
        const optionsArea = document.getElementById('optionsArea'), buzzStatus = document.getElementById('buzzStatus');
        const teamsContainer = document.getElementById('teamsContainer');
        function renderTeams() {
            teamsContainer.innerHTML = '';
            teams.forEach((team, idx) => {
                const card = document.createElement('div'); card.className = 'team-card';
                if (buzzedTeam === idx) card.classList.add('buzzed-highlight');
                card.innerHTML = `<div class="team-name">${team.name}</div><div class="team-score" id="score-${idx}">${team.score}</div>
                    <button class="buzz-btn" data-team="${idx}">🔴 抢答</button><div class="score-actions">
                    <button class="score-btn" data-team="${idx}" data-delta="1">➕</button>
                    <button class="score-btn" data-team="${idx}" data-delta="-1">➖</button></div>`;
                teamsContainer.appendChild(card);
            });
            document.querySelectorAll('.buzz-btn').forEach(btn => btn.addEventListener('click', e => {
                const idx = parseInt(btn.dataset.team); handleBuzz(idx);
            }));
            document.querySelectorAll('.score-btn').forEach(btn => btn.addEventListener('click', e => {
                const idx = parseInt(btn.dataset.team), delta = parseInt(btn.dataset.delta);
                teams[idx].score = Math.max(0, teams[idx].score + delta); updateScores();
            }));
            updateScores();
        }
        function updateScores() { teams.forEach((t,i) => { const s = document.getElementById(`score-${i}`); if(s) s.innerText = t.score; }); }
        function renderQuestion() {
            const q = currentQuestion;
            qIndexSpan.innerText = `第${currentIndex+1} / 30题`;
            qTypeSpan.innerText = `${q.type} · 10分`;
            qText.innerText = q.question;
            let html = ''; const letters = ['A','B','C','D','E','F'];
            q.options.forEach((opt, i) => { html += `<div class="option"><span class="option-letter">${letters[i]}</span><span>${opt}</span></div>`; });
            optionsArea.innerHTML = html;
            document.querySelectorAll('.option').forEach(el => el.classList.remove('correct-highlight'));
        }
        function highlightAnswer() {
            const ans = currentQuestion.answer;
            const idx = ['A','B','C','D','E','F'].indexOf(ans);
            if(idx>=0) { const opts = document.querySelectorAll('.option'); if(opts[idx]) opts[idx].classList.add('correct-highlight'); }
        }
        function resetBuzzState() {
            buzzActive = false; buzzedTeam = null; lockBuzz = false;
            buzzStatus.innerText = '✨ 抢答已重置，等待开始 ✨';
            document.querySelectorAll('.buzz-btn').forEach(btn => btn.disabled = false);
            renderTeams();
        }
        function handleBuzz(teamIdx) {
            if(!buzzActive) { buzzStatus.innerText = '⛔ 抢答未开始'; return; }
            if(lockBuzz || buzzedTeam!==null) { buzzStatus.innerText = '⚠️ 已有队伍抢答'; return; }
            buzzedTeam = teamIdx; lockBuzz = true; buzzActive = false;
            buzzStatus.innerText = `🎉 第${teamIdx+1}组 [${teams[teamIdx].name}] 抢答成功！`;
            document.querySelectorAll('.buzz-btn').forEach(btn => btn.disabled = true);
            renderTeams();
        }
        function applyScore(correct) {
            if(buzzedTeam===null) { alert('没有队伍抢答'); return; }
            const idx = buzzedTeam;
            if(correct) { teams[idx].score += BASE_SCORE; playSound('correct'); buzzStatus.innerText = `✅ 第${idx+1}组回答正确 +10`; }
            else { teams[idx].score = Math.max(0, teams[idx].score - BASE_SCORE); playSound('wrong'); buzzStatus.innerText = `❌ 第${idx+1}组回答错误 -10`; }
            updateScores(); lockBuzz = true; buzzActive = false;
            document.querySelectorAll('.buzz-btn').forEach(btn => btn.disabled = true);
            renderTeams();
        }
        function nextQuestion() {
            currentIndex = (currentIndex + 1) % selectedQuestions.length;
            currentQuestion = selectedQuestions[currentIndex];
            resetBuzzState(); renderQuestion();
        }

        // 初始化
        renderTeams(); renderQuestion();
        document.getElementById('startBuzzBtn').addEventListener('click', ()=>{
            if(lockBuzz || buzzedTeam!==null) resetBuzzState();
            buzzActive = true; buzzStatus.innerText = '🔔 抢答进行中！ 快按抢答按钮！';
            document.querySelectorAll('.buzz-btn').forEach(btn => btn.disabled = false);
        });
        document.getElementById('showAnswerBtn').addEventListener('click', highlightAnswer);
        document.getElementById('resetBuzzBtn').addEventListener('click', resetBuzzState);
        document.getElementById('correctBtn').addEventListener('click', ()=>applyScore(true));
        document.getElementById('wrongBtn').addEventListener('click', ()=>applyScore(false));
        document.getElementById('nextQuestionBtn').addEventListener('click', nextQuestion);
        document.getElementById('resetScoresBtn').addEventListener('click', ()=>{ teams.forEach(t=>t.score=0); updateScores(); });
        document.getElementById('fullscreenBtn').addEventListener('click', ()=>{
            if(!document.fullscreenElement) document.documentElement.requestFullscreen();
            else document.exitFullscreen();
        });
    })();
