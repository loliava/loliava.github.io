<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>研发技能竞赛 · 出题记分系统</title>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <style>
        :root {
            --bg-dark: #0a0f1c;
            --glass-bg: rgba(18, 25, 40, 0.7);
            --gold: #ffd700;
            --gold-light: #ffeb99;
            --green-accent: #2ecc71;
            --card-radius: 28px;
            --btn-radius: 16px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "PingFang SC", "Microsoft YaHei", sans-serif;
        }

        body {
            background: radial-gradient(circle at 20% 30%, #1e2a3a, #0b1018);
            min-height: 100vh;
            color: white;
            -webkit-font-smoothing: antialiased;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        /* 主容器改为左右两列布局 */
        .main-container {
            width: 1440px;
            max-width: 100%;
            display: flex;
            gap: 24px;
            align-items: stretch;
        }

        /* 左侧内容区（题目+队伍） */
        .left-content {
            flex: 1;
            min-width: 0;
            background: var(--glass-bg);
            backdrop-filter: blur(30px) saturate(200%);
            -webkit-backdrop-filter: blur(30px) saturate(200%);
            border: 1px solid rgba(255, 215, 0, 0.2);
            border-radius: 48px;
            box-shadow: 0 30px 50px rgba(0,0,0,0.6), 0 0 0 2px rgba(255,215,0,0.1) inset;
            padding: 24px 30px 30px;
        }

        /* 右侧按钮栏 - 垂直排列 */
        .right-actions {
            width: 240px;
            background: var(--glass-bg);
            backdrop-filter: blur(30px) saturate(200%);
            -webkit-backdrop-filter: blur(30px) saturate(200%);
            border: 1px solid rgba(255, 215, 0, 0.2);
            border-radius: 48px;
            box-shadow: 0 30px 50px rgba(0,0,0,0.6), 0 0 0 2px rgba(255,215,0,0.1) inset;
            padding: 30px 16px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            align-items: stretch;
        }

        .right-actions button {
            width: 100%;
            text-align: center;
            justify-content: center;
            white-space: nowrap;
        }

        /* 右侧信息面板（排名+进度） */
        .info-panel {
            margin-top: 10px;
            padding: 16px 12px;
            background: rgba(0,0,0,0.2);
            border-radius: 20px;
            border: 1px solid rgba(255,215,0,0.2);
        }

        .rank-title, .progress-title {
            font-size: 16px;
            color: var(--gold);
            margin-bottom: 8px;
            font-weight: 600;
            letter-spacing: 1px;
        }

        .rank-list {
            list-style: none;
            margin-bottom: 16px;
        }

        .rank-item {
            display: flex;
            justify-content: space-between;
            font-size: 16px;
            padding: 4px 0;
            color: #eee;
        }

        .rank-score {
            color: var(--gold);
            font-weight: 700;
        }

        .progress-display {
            font-size: 22px;
            font-weight: 700;
            color: var(--gold-light);
            text-align: center;
            padding: 8px;
            background: rgba(255,215,0,0.1);
            border-radius: 12px;
        }

        /* 标题居中 */
        .header {
            text-align: center;
            margin-bottom: 24px;
            padding-bottom: 16px;
            border-bottom: 2px solid rgba(255, 215, 0, 0.4);
        }
        .header h1 {
            font-size: 42px;
            font-weight: 700;
            background: linear-gradient(135deg, #ffffff, #ffd966);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 4px 20px rgba(255,215,0,0.3);
            letter-spacing: 4px;
        }
        .header p {
            font-size: 16px;
            color: #ffd966;
            margin-top: 8px;
            font-weight: 500;
            letter-spacing: 2px;
        }

        /* 题目卡片 - 增大尺寸 */
        .question-card {
            background: rgba(10, 18, 30, 0.6);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,215,0,0.3);
            border-radius: 36px;
            padding: 30px 40px;
            margin: 20px 0 30px;
            box-shadow: 0 20px 30px rgba(0,0,0,0.5), 0 0 30px rgba(255,215,0,0.1) inset;
            text-align: center;
            display: flex;
            flex-direction: column;
            min-height: 450px;
            max-height: 580px;
        }

        .q-meta {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 20px;
            flex-shrink: 0;
        }
        .q-type {
            background: var(--green-accent);
            color: #000;
            font-weight: 700;
            padding: 8px 24px;
            border-radius: 50px;
            font-size: 18px;
            letter-spacing: 1px;
        }

        .q-text-wrapper {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 5px 0;
            min-height: 0;
        }
        .q-text {
            font-weight: 700;
            line-height: 1.4;
            color: #fff;
            text-shadow: 0 4px 15px rgba(0,0,0,0.5);
            word-break: break-word;
            width: 100%;
            transition: font-size 0.1s ease;
            max-height: 100%;
            overflow-y: auto;
        }

        .options-grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px 30px;
            margin: 10px 0;
            flex-shrink: 0;
        }
        .option-item {
            font-size: 28px;
            background: rgba(255,255,255,0.03);
            padding: 12px 28px;
            border-radius: 60px;
            border: 1px solid rgba(255,215,0,0.2);
            backdrop-filter: blur(8px);
        }
        .option-item strong {
            color: var(--gold);
            margin-right: 15px;
            font-size: 32px;
        }
        .answer-area {
            margin-top: 15px;
            padding-top: 15px;
            border-top: 2px dashed rgba(255,215,0,0.4);
            font-size: 36px;
            font-weight: 600;
            color: var(--gold-light);
            flex-shrink: 0;
        }

        /* 队伍记分牌 */
        .teams-container {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            margin: 15px 0 10px;
        }
        .team-tile {
            flex: 1;
            background: rgba(0,0,0,0.35);
            backdrop-filter: blur(15px);
            border-radius: 30px;
            padding: 18px 5px 14px;
            border: 1px solid rgba(255,215,0,0.2);
            text-align: center;
            transition: all 0.2s;
            box-shadow: 0 10px 15px rgba(0,0,0,0.3);
        }
        .team-score {
            font-size: 44px;
            font-weight: 900;
            color: var(--gold);
            line-height: 1.2;
        }
        .team-name {
            font-size: 26px;
            font-weight: 600;
            margin: 8px 0 5px;
        }
        .score-ops {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 10px;
        }
        .score-btn-small {
            background: rgba(255,255,255,0.1);
            border: 1px solid var(--gold);
            color: var(--gold);
            font-weight: bold;
            font-size: 22px;
            width: 48px;
            height: 48px;
            border-radius: 30px;
            cursor: pointer;
            backdrop-filter: blur(5px);
            transition: 0.1s;
        }
        .score-btn-small:active { transform: scale(0.9); }

        /* 按钮样式统一 */
        .primary-btn {
            background: linear-gradient(145deg, #f1c40f, #f39c12);
            border: none;
            color: #1e1e1e;
            font-weight: 800;
            font-size: 20px;
            padding: 16px 12px;
            border-radius: var(--btn-radius);
            box-shadow: 0 6px 0 #b86d0e, 0 5px 15px rgba(241,196,15,0.3);
            cursor: pointer;
            transition: all 0.1s;
            border: 1px solid #ffe28c;
            letter-spacing: 2px;
        }
        .primary-btn:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 #b86d0e, 0 5px 10px rgba(241,196,15,0.3);
        }
        .secondary-btn {
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,215,0,0.4);
            color: var(--gold);
            font-weight: 700;
            font-size: 18px;
            padding: 14px 12px;
            border-radius: var(--btn-radius);
            cursor: pointer;
            transition: 0.1s;
            box-shadow: 0 4px 0 rgba(0,0,0,0.3);
        }
        .secondary-btn:active { transform: translateY(3px); box-shadow: 0 1px 0 rgba(0,0,0,0.3); }

        .fullscreen-btn {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,215,0,0.3);
            color: var(--gold);
            font-size: 24px;
            width: 100%;
            height: 56px;
            border-radius: var(--btn-radius);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            backdrop-filter: blur(10px);
            transition: all 0.2s;
            font-weight: 700;
        }
        .fullscreen-btn:hover { background: rgba(255,215,0,0.15); transform: scale(0.98); }

        /* 移动端适配 */
        @media (max-width: 900px) {
            .main-container {
                flex-direction: column;
            }
            .right-actions {
                width: 100%;
                flex-direction: row;
                flex-wrap: wrap;
                justify-content: center;
            }
            .right-actions button {
                width: auto;
                min-width: 120px;
            }
        }
    </style>
</head>
<body>

<div class="main-container">
    <!-- 左侧主要内容区 -->
    <div class="left-content">
        <div class="header">
            <h1>⚡ 匠心铸技 · 智创未来 ⚡</h1>
            <p>商用电器事业部 · 研发中心首届技能挑战赛</p>
        </div>

        <div class="question-card">
            <div class="q-meta">
                <span class="q-type" id="questionType">加载题库中</span>
            </div>
            <div class="q-text-wrapper">
                <div class="q-text" id="question">点击「加载题库」开始</div>
            </div>
            <div class="options-grid" id="optionsArea"></div>
            <div class="answer-area" id="answerText">参考答案：********</div>
        </div>

        <!-- 六队记分牌 -->
        <div class="teams-container" id="teamGrid"></div>
    </div>

    <!-- 右侧按钮栏 - 垂直排列 -->
    <div class="right-actions">
        <button class="primary-btn" onclick="nextQuestion()">🎲 随机出题</button>
        <button class="secondary-btn" onclick="toggleAnswer()">🔎 显示答案</button>
        <button class="secondary-btn" onclick="clearQuestion()">🔄 清空题目</button>
        <button class="secondary-btn" id="enableSpeechBtn" onclick="enableSpeech()">🔊 启用语音</button>
        <button class="secondary-btn" onclick="resetAllScores()">🔄 重置比分</button>
        <div class="fullscreen-btn" onclick="toggleFullscreen()" title="全屏模式">⛶ 全屏</div>
        
        <!-- 排名与进度信息面板 -->
        <div class="info-panel">
            <div class="rank-title">🏆 实时排名</div>
            <ul class="rank-list" id="rankList">
                <li class="rank-item"><span>研发一队</span><span class="rank-score">10</span></li>
            </ul>
            <div class="progress-title">📊 答题进度</div>
            <div class="progress-display" id="progressDisplay">0 / 30</div>
        </div>
    </div>
</div>

<script>
    (function(){
        // 修改后的队伍配置
        const teamConfig = [
            {id:1, name:"研发一队", score:10},
            {id:2, name:"研发二队", score:10},
            {id:3, name:"研发三队", score:10},
            {id:4, name:"风清扬", score:10},
            {id:5, name:"绝不躺平", score:10},
            {id:6, name:"答什么都队", score:10}
        ];

        let allQuestions = [];
        let currentAnswer = '';
        let currentOptions = [];
        let showAnswerFlag = false;
        
        // 进度计数
        let answeredCount = 0;
        const TOTAL_QUESTIONS = 30;

        // 语音相关
        let speechEnabled = false;
        let speechQueue = [];
        let isSpeaking = false;

        // 激活语音权限
        window.enableSpeech = function() {
            if (speechEnabled) {
                speak('语音已启用');
                return;
            }
            const utterance = new SpeechSynthesisUtterance('');
            utterance.volume = 0;
            utterance.onstart = () => {
                speechEnabled = true;
                const btn = document.getElementById('enableSpeechBtn');
                if (btn) btn.innerText = '🔊 语音已启用';
                setTimeout(() => speak('语音系统已激活'), 100);
            };
            utterance.onerror = () => {
                alert('语音功能不可用，请检查浏览器设置或使用 Chrome/Edge。');
            };
            window.speechSynthesis.speak(utterance);
        };

        function speak(text) {
            if (!speechEnabled) return;
            speechQueue.push(text);
            if (!isSpeaking) processSpeechQueue();
        }

        function processSpeechQueue() {
            if (speechQueue.length === 0) {
                isSpeaking = false;
                return;
            }
            isSpeaking = true;
            const utterance = new SpeechSynthesisUtterance(speechQueue.shift());
            utterance.lang = 'zh-CN';
            utterance.rate = 0.9;
            utterance.pitch = 1.1;
            utterance.onend = () => processSpeechQueue();
            utterance.onerror = () => processSpeechQueue();
            window.speechSynthesis.speak(utterance);
        }

        // 渲染队伍卡片
        function renderTeams() {
            const grid = document.getElementById('teamGrid'); 
            grid.innerHTML = '';
            teamConfig.forEach(t => {
                const tile = document.createElement('div'); 
                tile.className = 'team-tile'; 
                tile.id = `tile-${t.id}`;
                tile.innerHTML = `<div class="team-score" id="score-${t.id}">${t.score}</div>
                    <div class="team-name">${t.name}</div>
                    <div class="score-ops">
                        <button class="score-btn-small" onclick="adjustTeamScore(${t.id}, 1)">+</button>
                        <button class="score-btn-small" onclick="adjustTeamScore(${t.id}, -1)">-</button>
                    </div>`;
                grid.appendChild(tile);
            });
            updateRanking();
        }

        // 更新排名显示
        function updateRanking() {
            const sorted = [...teamConfig].sort((a, b) => b.score - a.score);
            const rankList = document.getElementById('rankList');
            rankList.innerHTML = '';
            sorted.forEach((team, index) => {
                const li = document.createElement('li');
                li.className = 'rank-item';
                li.innerHTML = `<span>${index+1}. ${team.name}</span><span class="rank-score">${team.score}</span>`;
                rankList.appendChild(li);
            });
        }

        // 更新进度显示
        function updateProgress() {
            const progressEl = document.getElementById('progressDisplay');
            progressEl.innerText = `${answeredCount} / ${TOTAL_QUESTIONS}`;
        }

        // 手动调整队伍分数（每次±1分）
        window.adjustTeamScore = function(teamId, delta) {
            const team = teamConfig.find(t => t.id === teamId);
            if (!team) return;
            team.score = Math.max(0, team.score + delta);
            document.getElementById(`score-${teamId}`).innerText = team.score;
            const actionText = delta > 0 ? `加${delta}分` : `减${-delta}分`;
            speak(`${team.name}，${actionText}`);
            updateRanking();
        };

        function updateScoreUI(teamId) { 
            const el = document.getElementById(`score-${teamId}`); 
            if(el) el.innerText = teamConfig.find(t=>t.id===teamId).score; 
        }

        // 重置所有比分
        window.resetAllScores = function() { 
            teamConfig.forEach(t => { t.score = 10; updateScoreUI(t.id); }); 
            speak('所有队伍分数已重置为10分');
            updateRanking();
        };

        // 全屏切换
        window.toggleFullscreen = function() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        };

        // 加载题库（适配新Excel结构）
        async function loadQuestions() {
            try {
                const res = await fetch('./研发知识题库.xlsx');
                if (!res.ok) throw new Error('文件不存在');
                const data = await res.arrayBuffer();
                const wb = XLSX.read(data, {type:'array'});
                const sheet = wb.Sheets[wb.SheetNames[0]];
                const rows = XLSX.utils.sheet_to_json(sheet, {header:1});
                allQuestions = [];
                for (let i = 1; i < rows.length; i++) {
                    const r = rows[i]; 
                    if (!r || r.length < 3) continue;
                    
                    const type = r[0]?.toString().trim() || '未知';
                    const question = r[1]?.toString().trim();
                    const answer = r[2]?.toString().trim().toUpperCase();
                    if (!question || !answer) continue;
                    
                    const options = [];
                    for (let j = 3; j <= 14; j++) {
                        if (r[j] && r[j].toString().trim() !== '') {
                            options.push(r[j].toString().trim());
                        }
                    }
                    
                    allQuestions.push({ type, question, answer, options });
                }
                document.getElementById('questionType').innerText = `📚 题库 ${allQuestions.length} 题`;
                document.getElementById('question').innerText = '题库就绪，点击「随机出题」';
                answeredCount = 0;
                updateProgress();
            } catch(e) {
                document.getElementById('question').innerText = '题库加载失败，请检查文件';
            }
        }

        // 自适应字号
        function adjustFontSize(element, maxFont = 60, minFont = 24) {
            const wrapper = element.parentElement;
            const containerHeight = wrapper.clientHeight;
            const containerWidth = wrapper.clientWidth;
            element.style.fontSize = maxFont + 'px';
            let fontSize = maxFont;
            while ((element.scrollWidth > containerWidth || element.scrollHeight > containerHeight) && fontSize > minFont) {
                fontSize -= 2;
                element.style.fontSize = fontSize + 'px';
            }
        }

        // 构建选项播报文本（修复字母D问题）
        function buildOptionsSpeech(options) {
            if (!options || options.length === 0) return '';
            const letters = ['A','B','C','D','E','F','G','H','I','J','K','L'];
            const parts = options.map((opt, idx) => {
                // 使用中文描述避免单字母发音异常
                return `选项${letters[idx]}、${opt}`;
            });
            return parts.join('；');
        }

        // 随机出题
        window.nextQuestion = function() {
            if (!allQuestions.length) {
                alert('请先加载题库（将 研发知识题库.xlsx 放在同级目录）');
                return;
            }
            if (!speechEnabled) enableSpeech();

            const q = allQuestions[Math.floor(Math.random() * allQuestions.length)];
            currentAnswer = q.answer;
            currentOptions = q.options || [];
            
            document.getElementById('questionType').innerText = `📌 ${q.type}`;
            const qTextEl = document.getElementById('question');
            qTextEl.innerText = q.question;
            
            setTimeout(() => adjustFontSize(qTextEl, 60, 24), 10);
            
            const optDiv = document.getElementById('optionsArea');
            if (currentOptions.length) {
                const letters = ['A','B','C','D','E','F','G','H','I','J','K','L'];
                optDiv.innerHTML = currentOptions.map((o,i) => `<div class="option-item"><strong>${letters[i]}</strong> ${o}</div>`).join('');
            } else {
                optDiv.innerHTML = '<div class="option-item">(本题无选项，口头作答)</div>';
            }
            
            showAnswerFlag = false;
            document.getElementById('answerText').innerText = '参考答案：********';
            
            // 更新答题进度
            answeredCount = Math.min(answeredCount + 1, TOTAL_QUESTIONS);
            updateProgress();
            
            // 语音播报题目和选项
            if (speechEnabled) {
                speak(q.question);
                const optionsSpeech = buildOptionsSpeech(currentOptions);
                if (optionsSpeech) {
                    speak(optionsSpeech);
                }
            }
        };

        // 切换答案显示（并语音播报答案）
        window.toggleAnswer = function() {
            showAnswerFlag = !showAnswerFlag;
            const answerElem = document.getElementById('answerText');
            if (showAnswerFlag) {
                answerElem.innerText = `参考答案：${currentAnswer}`;
                if (speechEnabled && currentAnswer) {
                    // 处理多选题答案播报（如"AB"读作"A B"）
                    const answerText = currentAnswer.split('').join(' ');
                    speak(`正确答案是 ${answerText}`);
                }
            } else {
                answerElem.innerText = '参考答案：********';
            }
        };

        // 清空题目（恢复初始状态，但进度不清零）
        window.clearQuestion = function() {
            document.getElementById('questionType').innerText = `📚 题库 ${allQuestions.length} 题`;
            document.getElementById('question').innerText = '点击「随机出题」开始';
            document.getElementById('optionsArea').innerHTML = '';
            document.getElementById('answerText').innerText = '参考答案：********';
            currentAnswer = '';
            currentOptions = [];
            showAnswerFlag = false;
        };

        // 初始化
        window.onload = async function() {
            renderTeams();
            await loadQuestions();
            updateRanking();
        };
    })();
</script>
</body>
</html>
